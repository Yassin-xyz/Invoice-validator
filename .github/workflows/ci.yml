name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Compiler l'extension
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Compiler (TypeScript)
        run: npm run compile

      - name: Vérifier le packaging VSIX
        run: npx --yes @vscode/vsce package --out facture-schematron-validator.vsix

      - name: Publier l'artefact VSIX
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: facture-schematron-validator.vsix
          if-no-files-found: error
